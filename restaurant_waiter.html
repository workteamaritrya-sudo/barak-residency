<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Restaurant Waiter | Barak Residency</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="restaurant_portal.css?v=1.7">
    <link rel="icon" href="br.png" type="image/png">
    <style>
        /* ═══ SELF-CONTAINED LAYOUT — overrides all base CSS conflicts ═══ */
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #050B18; font-family: 'Outfit', sans-serif; color: #fff; }

        /* ── APP SHELL ── */
        #rw-app { display: flex; flex-direction: column; height: 100vh; width: 100%; overflow: hidden; }

        /* ── TOP HEADER ── */
        #rw-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.8rem 1.2rem; flex-shrink: 0;
            background: rgba(212,175,55,0.06);
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }
        #rw-header .rw-title { font-family: 'Outfit',sans-serif; font-size: 1rem; font-weight: 800; color: #D4AF37; letter-spacing: 3px; text-transform: uppercase; }
        #rw-close-btn { background: transparent; border: none; color: #D4AF37; font-size: 2rem; line-height: 1; padding: 0 0.3rem; cursor: pointer; opacity: 0.85; transition: opacity 0.15s; }
        #rw-close-btn:hover { opacity: 1; }

        /* ── TABLE CHIP STRIP (always visible, horizontal scroll) ── */
        #rw-table-strip {
            flex-shrink: 0;
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 0.8rem;
            overflow-x: auto; overflow-y: hidden;
            background: rgba(5,11,24,0.7);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            scrollbar-width: none;
        }
        #rw-table-strip::-webkit-scrollbar { display: none; }
        #rw-strip-label { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.5px; flex-shrink: 0; padding-right: 0.5rem; border-right: 1px solid rgba(255,255,255,0.1); margin-right: 0.3rem; white-space: nowrap; }

        /* ── TABLE CHIP ── */
        .rw-chip {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex-shrink: 0; gap: 3px;
            min-width: 58px; height: 64px;
            padding: 6px 8px;
            border-radius: 16px;
            border: 1.5px solid rgba(255,255,255,0.1);
            background: rgba(15,23,42,0.8);
            cursor: pointer; transition: all 0.18s;
            position: relative;
        }
        .rw-chip:hover { border-color: rgba(212,175,55,0.4); }
        .rw-chip.active { background: rgba(212,175,55,0.12); border-color: #D4AF37; box-shadow: 0 0 12px rgba(212,175,55,0.2); }
        .rw-chip.occupied { border-color: #4ADE80; }
        .rw-chip .chip-id { font-size: 0.9rem; font-weight: 900; color: #fff; line-height: 1; }
        .rw-chip .chip-pax { font-size: 0.6rem; color: #94A3B8; font-weight: 600; line-height: 1; }
        .rw-chip .chip-dots { display: flex; gap: 3px; align-items: center; justify-content: center; }
        .rw-chip .bill-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

        /* ── DESKTOP SIDEBAR (hidden on mobile) ── */
        #rw-sidebar-desktop {
            display: none; /* hidden by default, shown only on desktop */
            flex-direction: column;
            width: 220px; flex-shrink: 0;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(255,255,255,0.07);
            overflow-y: auto;
            padding: 1rem 0.75rem;
        }
        #rw-sidebar-desktop h3 { font-size: 0.7rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.75rem; padding-left: 0.25rem; }
        /* Full table furniture cards in desktop sidebar */
        .rw-desk-table-btn {
            width: 100%; background: rgba(15,23,42,0.8); border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 0.8rem 0.5rem; margin-bottom: 0.5rem;
            cursor: pointer; transition: all 0.2s; color: #fff;
        }
        .rw-desk-table-btn:hover { border-color: rgba(212,175,55,0.4); }
        .rw-desk-table-btn.active { border-color: #D4AF37; background: rgba(212,175,55,0.08); }
        .rw-desk-table-btn.occupied { border-color: #4ADE80; }

        /* ── CONTENT AREA ── */
        #rw-content { display: flex; flex: 1; overflow: hidden; }

        /* ── POS PANEL (menu + desktop cart) ── */
        #rw-pos { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

        /* ── POS HEADER BAR ── */
        #rw-pos-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.6rem 1rem; flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            background: rgba(0,0,0,0.15);
        }
        #rest-waiter-pos-title { font-size: 1rem; font-weight: 700; margin: 0; }
        #rest-waiter-table-info { font-size: 0.75rem; color: #94A3B8; }

        /* ── SEARCH ── */
        #rw-search-wrap { padding: 0.6rem 0.75rem; flex-shrink: 0; }
        #rest-waiter-menu-search {
            width: 100%; padding: 0.65rem 1rem;
            background: rgba(15,23,42,0.9); border: 1px solid rgba(212,175,55,0.3);
            border-radius: 10px; color: #fff; font-size: 0.9rem; outline: none;
        }
        #rest-waiter-menu-search::placeholder { color: rgba(255,255,255,0.35); }

        /* ── MENU GRID ── */
        #rw-menu-scroll { flex: 1; overflow-y: auto; padding: 0.5rem 0.75rem 5rem; }
        #rest-waiter-menu-grid { display: grid; gap: 0.75rem; }
        @media (min-width: 601px) { #rest-waiter-menu-grid { grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); } }
        @media (max-width: 600px) { #rest-waiter-menu-grid { grid-template-columns: 1fr; gap: 0.6rem; } }

        /* ── DESKTOP CART ── */
        #rw-desktop-cart {
            display: none; /* shown only on desktop via media query */
            flex-direction: column;
            width: 300px; flex-shrink: 0;
            border-left: 1px solid rgba(255,255,255,0.07);
            background: rgba(0,0,0,0.2);
        }
        #rw-desktop-cart .cart-head { padding: 1rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.07); font-weight: 800; color: #D4AF37; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; }
        #rest-waiter-cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
        #rw-cart-footer { padding: 1rem; border-top: 1px solid rgba(255,255,255,0.07); }

        /* ── DESKTOP LAYOUT (>= 900px) ── */
        @media (min-width: 900px) {
            #rw-table-strip { display: none; } /* hide chip strip on desktop */
            #rw-sidebar-desktop { display: flex; } /* show sidebar on desktop */
            #rw-desktop-cart { display: flex; } /* show cart panel on desktop */
        }

        /* ── FLOATING CART BTN (mobile only) ── */
        #floating-cart {
            position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 900;
            background: #D4AF37; color: #000; border-radius: 50%;
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(212,175,55,0.45); border: none; cursor: pointer;
        }
        @media (min-width: 900px) { #floating-cart { display: none; } }

        #cart-badge-val {
            position: absolute; top: -4px; right: -4px;
            background: #FF4444; color: #fff; border-radius: 50%;
            min-width: 20px; height: 20px; font-size: 0.7rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #050B18;
        }

        /* ── MOBILE CART OVERLAY ── */
        #cart-overlay-mob {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(5,11,26,0.98); backdrop-filter: blur(20px);
            flex-direction: column; padding: 1.5rem;
        }
        #cart-overlay-mob.active { display: flex; animation: slideUp 0.35s cubic-bezier(.22,1,.36,1); }

        /* ── SUCCESS OVERLAY ── */
        #success-screen {
            display: none; position: fixed; inset: 0; z-index: 5000;
            background: #050B1A; align-items: center; justify-content: center;
            flex-direction: column; text-align: center;
        }
        .success-medal { width: 110px; height: 110px; background: #D4AF37; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 3.5rem; margin-bottom: 1.5rem; box-shadow: 0 0 50px rgba(212,175,55,0.35); animation: medalPop 0.6s cubic-bezier(0.34,1.56,0.64,1); }

        /* ── ANIMATIONS ── */
        @keyframes medalPop { 0% { transform:scale(0); opacity:0; } 100% { transform:scale(1); opacity:1; } }
        @keyframes slideUp { 0% { transform:translateY(100%); } 100% { transform:translateY(0); } }

        /* ── DESKTOP TABLE FURNITURE inside sidebar ── */
        .rw-furn { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 4px; }
        .rw-furn-row { display: flex; gap: 4px; }
        .rw-chair { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .rw-chair svg { width: 14px; height: 14px; }
        .rw-table-box { font-size: 0.8rem; font-weight: 900; color: #D4AF37; border: 1.5px solid rgba(212,175,55,0.4); border-radius: 6px; padding: 2px 8px; }
    </style>
</head>
<body>

<div id="rw-app">
    <!-- ── HEADER ── -->
    <header id="rw-header">
        <span class="rw-title">Barak Table Order</span>
        <button id="rw-close-btn" onclick="window.backToHome()">&times;</button>
    </header>

    <!-- ── MOBILE: TABLE CHIP STRIP ── -->
    <div id="rw-table-strip">
        <span id="rw-strip-label">Tables</span>
        <div id="rw-mob-table-list" style="display:flex;gap:0.5rem;"></div>
    </div>

    <!-- ── MAIN CONTENT ── -->
    <div id="rw-content">

        <!-- DESKTOP ONLY: Sidebar with full table cards -->
        <div id="rw-sidebar-desktop">
            <h3>Select Table</h3>
            <!-- id="rest-waiter-table-list" is the canonical ID used by renderTableSidebar() -->
            <div id="rest-waiter-table-list" id2="rw-desk-table-list"></div>
        </div>

        <!-- POS Panel -->
        <div id="rw-pos">
            <!-- POS Title -->
            <div id="rw-pos-header">
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <h2 id="rest-waiter-pos-title" style="margin:0;font-size:1rem;">Select a table</h2>
                    <button id="btn-link-table" class="btn btn-outline"
                        style="display:none;padding:0.25rem 0.7rem;font-size:0.8rem;border-color:#A020F0;color:#A020F0;"
                        onclick="showLinkTableModal()">Link Table</button>
                </div>
                <span id="rest-waiter-table-info" style="font-size:0.75rem;color:#94A3B8;"></span>
            </div>

            <!-- Search -->
            <div id="rw-search-wrap">
                <input type="search" id="rest-waiter-menu-search" placeholder="Search menu..." oninput="filterMenu(this.value)">
            </div>

            <!-- Menu grid + Desktop cart side by side -->
            <div style="display:flex;flex:1;overflow:hidden;">
                <div id="rw-menu-scroll">
                    <div id="rest-waiter-menu-grid"></div>
                </div>
                <!-- Desktop Cart Panel -->
                <div id="rw-desktop-cart">
                    <div class="cart-head">Live Cart</div>
                    <div id="rest-waiter-cart-items"></div>
                    <div id="rw-cart-footer">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                            <span style="opacity:0.6;font-size:0.9rem;">Total</span>
                            <span style="color:#4ADE80;font-size:1.5rem;font-weight:900;">₹<span id="rest-waiter-cart-total">0</span></span>
                        </div>
                        <button class="btn btn-primary btn-block" id="btn-rest-waiter-order" disabled onclick="showOrderConfirm()"
                            style="padding:1.1rem;font-size:1.1rem;background:#D4AF37;color:#000;font-weight:900;width:100%;border-radius:12px;">
                            PLACE ORDER
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Mobile Cart Overlay -->
<div id="cart-overlay-mob">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <h2 style="color:#D4AF37;font-weight:900;letter-spacing:2px;font-size:1.1rem;">REVIEW ORDER</h2>
        <button onclick="window.toggleCart()" style="background:transparent;border:none;color:#fff;font-size:2rem;cursor:pointer;">&times;</button>
    </div>
    <div id="cart-placeholder-mob" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>
    <div style="flex-shrink:0;padding-top:1rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
            <span style="opacity:0.6;">Total</span>
            <span style="color:#4ADE80;font-size:1.5rem;font-weight:900;">₹<span id="mob-cart-total">0</span></span>
        </div>
        <button class="btn btn-primary btn-block" id="btn-mob-order" disabled onclick="showOrderConfirm()"
            style="padding:1.1rem;font-size:1.1rem;background:#D4AF37;color:#000;font-weight:900;width:100%;border-radius:12px;">
            PLACE ORDER
        </button>
    </div>
</div>

<!-- Floating Cart FAB -->
<button id="floating-cart" onclick="window.toggleCart()">
    <svg style="width:26px;height:26px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"></path></svg>
    <span id="cart-badge-val" style="display:none;">0</span>
</button>

<!-- Success Screen -->
<div id="success-screen">
    <div class="success-medal">✓</div>
    <h1 style="color:#D4AF37;font-weight:900;letter-spacing:3px;margin-bottom:0.75rem;">ORDER PLACED</h1>
    <p style="color:rgba(255,255,255,0.5);letter-spacing:1px;">Returning to portal...</p>
</div>

<!-- ── MODALS (unchanged) ── -->
<div id="success-overlay-pms" class="success-overlay-pms" style="display:none;"></div>
<div id="print-area"></div>

<div id="waiter-modal-overlay" class="modal-overlay" style="display:none;z-index:10005;">
    <div class="security-box" style="padding:2.5rem 2rem;width:450px;position:relative;max-width:95vw;">
        <h3 class="color-primary" style="text-align:center;margin-bottom:1.5rem;" id="tci-title">Table Check-in</h3>
        <form id="table-checkin-form" onsubmit="submitTableCheckin(event)">
            <input type="hidden" id="tci-tableid">
            <div id="tci-active-guests-list" style="display:none;flex-direction:column;gap:0.5rem;margin-bottom:1rem;"></div>
            <div id="tci-inputs-wrapper">
                <div class="form-group mb-4" style="text-align:left;">
                    <label>Guest Name</label>
                    <input type="text" id="tci-name" class="form-control" placeholder="Walk-in Guest" style="min-height:50px;">
                </div>
                <div class="form-group mb-4" style="text-align:left;">
                    <label>Number of Persons (Pax)</label>
                    <input type="number" id="tci-pax" class="form-control" min="1" max="4" value="2" style="min-height:50px;">
                </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:1rem;">
                <button type="button" class="btn btn-outline" style="display:none;border-color:var(--color-mint-400);color:var(--color-mint-400);padding:1rem;" id="btn-add-new-guest">Add New Guest</button>
                <button type="submit" class="btn btn-primary" style="padding:1rem;font-size:1.1rem;" id="btn-confirm-tci">Start Order</button>
                <button type="button" class="btn btn-outline" style="border:none;text-decoration:underline;" onclick="cancelModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<div id="order-confirm-modal" class="modal-overlay" style="display:none;z-index:10006;">
    <div class="security-box" style="padding:2rem;width:450px;max-width:95vw;">
        <h3 style="text-align:center;margin-bottom:1.5rem;">Confirm Order: <span id="confirm-order-id"></span></h3>
        <div id="confirm-order-items" style="text-align:left;color:white;max-height:250px;overflow-y:auto;margin-bottom:1.5rem;"></div>
        <div style="display:flex;flex-direction:column;gap:1rem;">
            <button class="btn btn-primary" style="padding:1rem;font-size:1.1rem;background:linear-gradient(135deg,#10b981,#059669);" onclick="confirmOrder()">Confirm &amp; Send to Kitchen</button>
            <button class="btn btn-outline" style="padding:0.8rem;" onclick="document.getElementById('order-confirm-modal').style.display='none'">Edit Order</button>
        </div>
    </div>
</div>

<div id="quantity-prompt-modal" class="modal-overlay" style="display:none;z-index:10006;">
    <div class="security-box" style="padding:2.5rem 2rem;width:400px;max-width:95vw;text-align:center;">
        <h3 id="qp-item-name" style="color:var(--color-indigo-400);margin-bottom:1.5rem;"></h3>
        <div id="qp-view-variant" style="display:flex;flex-direction:column;gap:1rem;">
            <p class="text-sm text-gray">Select Portion Size</p>
            <button class="btn btn-outline" style="padding:1.5rem;font-size:1.1rem;" onclick="qpSelectVariant('Full')">Full Plate</button>
            <button class="btn btn-outline" style="padding:1.5rem;font-size:1.1rem;border-color:var(--color-indigo-400);" onclick="qpSelectVariant('Half')">Half Plate</button>
            <button class="btn btn-outline" style="border:none;text-decoration:underline;" onclick="document.getElementById('quantity-prompt-modal').style.display='none'">Cancel</button>
        </div>
        <div id="qp-view-quantity" style="display:none;flex-direction:column;gap:1.5rem;">
            <p id="qp-selected-variant-text" style="color:var(--color-indigo-400);font-weight:bold;">Full Plate</p>
            <div style="display:flex;align-items:center;gap:1rem;justify-content:center;background:rgba(0,0,0,0.3);border-radius:8px;padding:1rem;">
                <button class="btn btn-outline" style="width:50px;height:50px;border-radius:50%;padding:0;font-size:1.5rem;" onclick="document.getElementById('qp-qty').value=Math.max(1,parseInt(document.getElementById('qp-qty').value)-1)">-</button>
                <input type="number" id="qp-qty" min="1" value="1" style="width:80px;text-align:center;background:transparent;border:none;color:white;font-size:2rem;font-weight:bold;outline:none;">
                <button class="btn btn-outline" style="width:50px;height:50px;border-radius:50%;padding:0;font-size:1.5rem;" onclick="document.getElementById('qp-qty').value=parseInt(document.getElementById('qp-qty').value)+1">+</button>
            </div>
            <div style="display:flex;gap:1rem;">
                <button class="btn btn-outline" style="flex:1;" onclick="qpBack()">← Back</button>
                <button class="btn btn-primary" style="flex:2;font-size:1.1rem;" onclick="addToCartFromModal()">Add to Cart</button>
            </div>
        </div>
    </div>
</div>

<div id="link-table-modal" class="modal-overlay" style="display:none;z-index:10005;align-items:stretch;justify-content:stretch;padding:2rem;">
    <div style="width:100%;height:100%;display:grid;grid-template-columns:1fr 1fr;gap:2rem;background:rgba(15,23,42,0.95);border-radius:16px;border:1px solid var(--glass-border);overflow:hidden;">
        <div style="padding:2rem;border-right:1px solid var(--glass-border);display:flex;flex-direction:column;">
            <h2 style="color:#A020F0;margin-bottom:0.5rem;">Master Bill Group</h2>
            <p class="text-gray" id="link-table-subtitle" style="margin-bottom:2rem;"></p>
            <h3 style="margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px dashed var(--glass-border);">Previously Linked</h3>
            <div id="link-existing-list" style="flex:1;overflow-y:auto;"></div>
            <button class="btn btn-outline" style="margin-top:1rem;padding:1rem;" onclick="document.getElementById('link-table-modal').style.display='none'">← Return to POS</button>
        </div>
        <div style="padding:2rem;display:flex;flex-direction:column;background:rgba(0,0,0,0.2);">
            <h2 style="margin-bottom:1rem;">Link A New Table</h2>
            <div class="form-group mb-4">
                <label>Pax to Link</label>
                <input type="number" id="link-pax-input" class="form-control" min="1" value="1" oninput="renderLinkDropdown()" style="background:rgba(0,0,0,0.5);padding:1.25rem;color:white;border:1px solid var(--glass-border);border-radius:8px;font-size:1.2rem;">
            </div>
            <div class="form-group" style="display:flex;flex-direction:column;flex:1;">
                <label>Available Tables</label>
                <select id="link-table-dropdown" class="form-control" size="8" style="flex:1;background:rgba(0,0,0,0.5);padding:1rem;color:white;border:1px solid var(--glass-border);border-radius:8px;font-size:1.1rem;"></select>
            </div>
            <button class="btn btn-primary" style="background:#A020F0;border-color:#A020F0;padding:1.25rem;font-size:1.2rem;margin-top:1rem;" onclick="submitLinkTable()">Confirm Link</button>
        </div>
    </div>
</div>

<script type="module" src="restaurant_waiter_app.js?v=2.0"></script>
</body>
</html>
