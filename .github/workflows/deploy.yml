name: Deploy to GitHub Pages Securely

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Inject Secrets into Firebase Config
        run: |
          # Robust replacement for Master Key
          sed -i "s|const MASTER_KEY = .*|const MASTER_KEY = \"${{ secrets.FIREBASE_MASTER_KEY }}\";|" firebase-config.js
          
          # Robust replacement for Gemini Key
          sed -i "s|const RESTRICTED_AI_KEY = .*|const RESTRICTED_AI_KEY = \"${{ secrets.GEMINI_KEY }}\";|" firebase-config.js
          
          echo "[INFO] Environmental keys injected successfully."

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          token: ${{ secrets.GITHUB_TOKEN }}
