<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barak Residency — Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="module" src="firebase-sync.js"></script>
    <style>
        :root {
            --bg: #050B1A;
            --gold: #D4AF37;
            --gold-light: #F2D27E;
            --gold-dim: rgba(212,175,55,0.25);
            --gold-glow: rgba(212,175,55,0.12);
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Background Particles / Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: orb-drift 12s ease-in-out infinite alternate;
        }
        .orb-1 { width: 600px; height: 600px; background: rgba(212,175,55,0.07); top: -150px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: rgba(100,120,200,0.06); bottom: -100px; right: -100px; animation-delay: 4s; }
        .orb-3 { width: 300px; height: 300px; background: rgba(212,175,55,0.04); top: 40%; right: 10%; animation-delay: 2s; }
        @keyframes orb-drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px, 30px) scale(1.1); } }

        /* Grid lines decoration */
        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(212,175,55,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212,175,55,0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
        }

        /* Layout */
        .page-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
            z-index: 1;
            position: relative;
        }

        .page-right {
            width: 520px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem 3.5rem;
            background: rgba(10, 18, 41, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            z-index: 1;
        }

        /* Branding */
        .brand-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 2.5rem;
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.5));
            animation: logo-pulse 4s ease-in-out infinite;
        }
        @keyframes logo-pulse {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); }
            50% { filter: drop-shadow(0 0 30px rgba(212,175,55,0.7)); }
        }

        .brand-name-luxury {
            font-family: 'Cormorant Garamond', serif;
            font-size: 5.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: var(--gold);
            line-height: 1;
            text-align: center;
            animation: fade-slide-up 1s ease-out 0.2s both;
        }
        .brand-subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.5em;
            color: rgba(212,175,55,0.6);
            text-transform: uppercase;
            margin-top: 0.8rem;
            text-align: center;
            animation: fade-slide-up 1s ease-out 0.4s both;
        }
        .brand-divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 2rem auto;
            animation: fade-in 1s ease-out 0.6s both;
        }
        .brand-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 400;
            color: rgba(255,255,255,0.5);
            font-style: italic;
            text-align: center;
            line-height: 1.7;
            max-width: 400px;
            animation: fade-in 1s ease-out 0.8s both;
        }

        /* Decorative line elements */
        .deco-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            height: 1px;
            width: 80%;
            left: 10%;
            animation: fade-in 1.5s ease-out 1s both;
        }
        .deco-line-top { top: 15%; }
        .deco-line-bottom { bottom: 15%; }

        /* Floating stats */
        .stat-pill {
            position: absolute;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            animation: fade-in 1s ease-out 1.2s both;
        }
        .stat-pill span { color: var(--gold); font-weight: 700; }
        .stat-1 { top: 20%; left: 8%; }
        .stat-2 { bottom: 25%; left: 5%; }
        .stat-3 { top: 30%; right: 5%; }

        /* Login Card */
        .login-card-inner {
            width: 100%;
            max-width: 400px;
            animation: fade-slide-up 0.8s ease-out 0.3s both;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .login-header img {
            width: 50px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.4));
        }
        .login-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }
        .login-header p {
            color: rgba(255,255,255,0.35);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        .form-label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(212,175,55,0.7);
            font-weight: 600;
            margin-bottom: 0.6rem;
        }
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: var(--gold-dim);
            background: rgba(212,175,55,0.04);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.07);
        }
        .form-input::placeholder { color: rgba(255,255,255,0.2); }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #D4AF37, #B8941E);
            color: #0A0A0A;
            border: none;
            padding: 1.1rem;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212,175,55,0.3); }
        .login-btn:active { transform: translateY(0); }
        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
        }

        .loader {
            display: none;
            width: 20px; height: 20px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top: 2px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #FCA5A5;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            text-align: center;
        }

        .login-footer {
            margin-top: 2rem;
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        /* Page loader overlay */
        #page-loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            animation: fade-out 0.6s ease-out 1.5s both;
            pointer-events: none;
        }
        .loader-logo {
            width: 70px;
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.6));
            animation: logo-pulse 1.5s ease-in-out infinite;
        }
        .loader-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: var(--gold);
            letter-spacing: 0.2em;
            animation: fade-in-out 1.5s ease-in-out;
        }
        .loader-bar {
            width: 200px;
            height: 1px;
            background: var(--glass-border);
            border-radius: 1px;
            overflow: hidden;
        }
        .loader-bar-fill {
            height: 100%;
            background: var(--gold);
            animation: fill-bar 1.3s ease-out 0.2s both;
        }
        @keyframes fill-bar { from { width: 0%; } to { width: 100%; } }
        @keyframes fade-in-out { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        @keyframes fade-out { to { opacity: 0; visibility: hidden; } }

        @keyframes fade-slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            .page-left { display: none; }
            .page-right {
                width: 100%;
                background: var(--bg);
                border-left: none;
                padding: 3rem 2rem;
            }
        }
    </style>
</head>
<body>

<!-- Page Loader -->
<div id="page-loader">
    <img src="br.png" class="loader-logo" alt="Barak Residency" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22><text y=%221em%22 font-size=%2250%22>🏨</text></svg>'">
    <div class="loader-name">BARAK RESIDENCY</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-lines"></div>

<!-- Left: Luxury Branding -->
<div class="page-left">
    <div class="deco-line deco-line-top"></div>

    <div style="text-align:center; position: relative; z-index: 2;">
        <img src="br.png" class="brand-logo" alt="Barak Residency" onerror="this.style.display='none'">
        <div class="brand-name-luxury">BARAK<br>RESIDENCY</div>
        <div class="brand-subtitle">Silchar · Assam · India</div>
        <div class="brand-divider"></div>
        <p class="brand-tagline">
            Where every detail is crafted for<br>
            your perfect stay experience.
        </p>
    </div>

    <div class="deco-line deco-line-bottom"></div>

    <div class="stat-pill stat-1">ROOMS <span>26</span></div>
    <div class="stat-pill stat-2">EST. <span>2018</span></div>
    <div class="stat-pill stat-3">RATING <span>4.8★</span></div>
</div>

<!-- Right: Login Form -->
<div class="page-right">
    <div class="login-card-inner">
        <div class="login-header">
            <img src="br.png" alt="Logo" onerror="this.style.display='none'">
            <h2>Management Login</h2>
            <p>Authorized Personnel Only</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label">User ID / Employee ID</label>
                <input type="text" id="emp-id" class="form-input" placeholder="e.g. BR-ADM-001" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">
                <span id="btn-text">SIGN IN</span>
                <div id="btn-loader" class="loader"></div>
            </button>
            <div id="error-msg" class="error-msg"></div>
        </form>

        <div class="login-footer">
            BARAK RESIDENCY MANAGEMENT SYSTEM v2.0<br>
            <span style="opacity:0.5">Secure · Cloud · Real-time</span>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseHooks, firebaseAuth, firebaseFS } from './firebase-sync.js';
    
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const btnText = document.getElementById('btn-text');
    const btnLoader = document.getElementById('btn-loader');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const empId = document.getElementById('emp-id').value.trim();
        const password = document.getElementById('password').value;

        errorMsg.style.display = 'none';
        btnText.style.display = 'none';
        btnLoader.style.display = 'block';

        try {
            const usersRef = firebaseHooks.collection(firebaseFS, 'users');
            const q = firebaseHooks.query(usersRef, firebaseHooks.where('empId', '==', empId));
            const snap = await firebaseHooks.getDocs(q);

            if (snap.empty) throw new Error("User ID not found.");
            const userData = snap.docs[0].data();
            const email = userData.assignedEmail;
            if (!email) throw new Error("Account configuration error.");

            await firebaseHooks.signInWithEmailAndPassword(firebaseAuth, email, password);
            
            const role = (userData.role || "").toLowerCase();
            if (role.includes("hotel") && role.includes("waiter")) {
                window.location.href = 'hotel_waiter.html';
            } else if (role.includes("rest") && role.includes("waiter")) {
                window.location.href = 'restaurant_waiter.html';
            } else if (role.includes("rest") && role.includes("desk")) {
                window.location.href = 'restaurant_desk.html';
            } else {
                window.location.href = 'index.html';
            }
        } catch (error) {
            console.error("Login failed:", error);
            const msg = error.message.includes("not found") ? "User ID not found in system." 
                : error.message.includes("password") || error.message.includes("credentials") 
                ? "Incorrect password. Please try again."
                : "Authentication failed. Please try again.";
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';
            btnText.style.display = 'block';
            btnLoader.style.display = 'none';
        }
    });

    // Redirect if already logged in
    firebaseHooks.onAuthStateChanged(firebaseAuth, async (user) => {
        if (user) {
            try {
                const usersRef = firebaseHooks.collection(firebaseFS, 'users');
                const q = firebaseHooks.query(usersRef, firebaseHooks.where('assignedEmail', '==', user.email));
                const snap = await firebaseHooks.getDocs(q);
                
                if (!snap.empty) {
                    const userData = snap.docs[0].data();
                    const role = (userData.role || "").toLowerCase();
                    if (role.includes("hotel") && role.includes("waiter")) {
                        window.location.href = 'hotel_waiter.html'; return;
                    } else if (role.includes("rest") && role.includes("waiter")) {
                        window.location.href = 'restaurant_waiter.html'; return;
                    } else if (role.includes("rest") && role.includes("desk")) {
                        window.location.href = 'restaurant_desk.html'; return;
                    }
                }
                window.location.href = 'index.html';
            } catch (e) {
                window.location.href = 'index.html';
            }
        }
    });
</script>
</body>
</html>
