<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Barak Residency PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script type="module" src="firebase-sync.js"></script>
    <style>
        :root {
            --bg-deep: #050B1A;
            --bg-accent: #0A1229;
            --gold-primary: #D4AF37;
            --gold-dim: rgba(212, 175, 55, 0.3);
            --text-white: #FFFFFF;
            --text-gray: #94A3B8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: var(--bg-accent);
            border: 1px solid var(--gold-dim);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo {
            width: 80px;
            margin-bottom: 1.5rem;
        }

        h1 {
            color: var(--gold-primary);
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: var(--gold-primary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--gold-dim);
            padding: 1rem;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--gold-primary);
            background: rgba(212,175,55,0.05);
        }

        .login-btn {
            width: 100%;
            background: var(--gold-primary);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background: #f2d27e;
            transform: translateY(-2px);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="br.png" alt="Barak Residency" class="logo">
        <h1>Management Portal</h1>
        <p>Enter your credentials to manage Barak Residency</p>

        <form id="login-form">
            <div class="input-group">
                <label>User ID (Employee ID)</label>
                <input type="text" id="emp-id" placeholder="e.g. BR-ADM-001" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">
                <span id="btn-text">SIGN IN</span>
                <div id="btn-loader" class="loader"></div>
            </button>
            <div id="error-msg" class="error-msg">Invalid User ID or Password.</div>
        </form>
    </div>

    <script type="module">
        import { firebaseHooks, firebaseAuth, firebaseFS } from './firebase-sync.js';
        
        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const empId = document.getElementById('emp-id').value.trim();
            const password = document.getElementById('password').value;

            errorMsg.style.display = 'none';
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';

            try {
                // 1. Look up email for this Employee ID
                const usersRef = firebaseHooks.collection(firebaseFS, 'users');
                const q = firebaseHooks.query(usersRef, firebaseHooks.where('empId', '==', empId));
                const snap = await firebaseHooks.getDocs(q);

                if (snap.empty) {
                    throw new Error("User ID not found.");
                }

                const userData = snap.docs[0].data();
                const email = userData.assignedEmail;

                if (!email) {
                    throw new Error("User has no associated email.");
                }

                // 2. Sign in with discovered email
                await firebaseHooks.signInWithEmailAndPassword(firebaseAuth, email, password);
                
                // 3. Redirect based on role
                const role = (userData.role || "").toLowerCase();
                if (role.includes("rest") && role.includes("waiter")) {
                    window.location.href = 'restaurant_waiter.html';
                } else if (role.includes("rest") && role.includes("desk")) {
                    window.location.href = 'restaurant_desk.html';
                } else {
                    window.location.href = 'index.html';
                }

            } catch (error) {
                console.error("Login failed:", error);
                errorMsg.innerText = error.message.includes("not found") ? "User ID not found." : "Invalid credentials. Please try again.";
                errorMsg.style.display = 'block';
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        });

        // Redirect if already logged in
        firebaseHooks.onAuthStateChanged(firebaseAuth, async (user) => {
            if (user) {
                try {
                    const usersRef = firebaseHooks.collection(firebaseFS, 'users');
                    const q = firebaseHooks.query(usersRef, firebaseHooks.where('assignedEmail', '==', user.email));
                    const snap = await firebaseHooks.getDocs(q);
                    
                    if (!snap.empty) {
                        const userData = snap.docs[0].data();
                        const role = (userData.role || "").toLowerCase();
                        if (role.includes("rest") && role.includes("waiter")) {
                            window.location.href = 'restaurant_waiter.html';
                            return;
                        } else if (role.includes("rest") && role.includes("desk")) {
                            window.location.href = 'restaurant_desk.html';
                            return;
                        }
                    }
                    window.location.href = 'index.html';
                } catch (e) {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
