<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Staff Portal</title>
    <meta name="description" content="Unified Staff Portal for Barak Residency hotel and restaurant teams.">
    <link rel="manifest" href="staff_manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --surface: #0F172A;
            --surface-2: #1E293B;
            --gold: #EAB308;
            --gold-dim: rgba(234, 179, 8, 0.1);
            --gold-border: rgba(234, 179, 8, 0.3);
            --green: #10B981;
            --red: #EF4444;
            --blue: #3B82F6;
            --amber: #F59E0B;
            --purple: #8B5CF6;
            --border: rgba(255, 255, 255, 0.06);
            --text-mute: rgba(255, 255, 255, 0.45);
            --text-soft: rgba(255, 255, 255, 0.75);
            --radius: 24px;
            --radius-sm: 14px;
            --safe-top: env(safe-area-inset-top, 20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow-x: hidden;
            background: var(--bg);
            overscroll-behavior-y: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            background-image:
                radial-gradient(circle at top right, rgba(234, 179, 8, 0.05), transparent 400px),
                radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.03), transparent 400px);
            padding-top: var(--safe-top);
        }

        /*  Page Loader / Splash Screen  */
        #page-loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.9;
                filter: drop-shadow(0 0 0 rgba(234, 179, 8, 0));
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
                filter: drop-shadow(0 0 20px rgba(234, 179, 8, 0.2));
            }
        }

        .loader-spin {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /*  Sticky Time Bar  */
        .sticky-time-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(11, 20, 39, 0.85);
            backdrop-filter: blur(14px);
            padding: 0.8rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.3s ease;
        }

        .stb-time {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: var(--gold);
            font-size: 1rem;
        }

        .stb-status {
            font-size: 0.65rem;
            color: var(--text-mute);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /*  Brand  */
        .brand {
            text-align: center;
            padding: 1.5rem 1rem 1rem;
        }

        .brand h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7rem;
            letter-spacing: 5px;
            color: var(--gold);
            font-weight: 600;
        }

        .brand p {
            font-size: 0.62rem;
            letter-spacing: 4px;
            color: var(--text-mute);
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        /*  Auth Card  */
        #auth-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 4.5rem 1.5rem 2rem; /* Added top padding for mobile */
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.4s ease;
        }

        .tab-row {
            display: flex;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 0.65rem;
            border: none;
            background: transparent;
            color: var(--text-mute);
            cursor: pointer;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.25s;
        }

        .tab-btn.active {
            background: var(--gold-dim);
            color: var(--gold);
            border: 1px solid var(--gold-border);
        }

        label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-mute);
            margin-bottom: 0.5rem;
        }

        input,
        select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: #fff;
            padding: 0.85rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1.2rem;
        }

        input:focus,
        select:focus {
            border-color: var(--gold);
        }

        select option {
            background: #0B1427;
        }

        .btn-primary {
            width: 100%;
            padding: 0.95rem;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #C9A227, var(--gold));
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .msg {
            font-size: 0.8rem;
            text-align: center;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .msg.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .msg.success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        /*  Dashboard Layout  */
        #dashboard {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 1rem 6rem;
        }

        /*  Welcome Banner  */
        .welcome-banner {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
            border: 1px solid var(--gold-border);
            border-radius: var(--radius);
            padding: 1.5rem 1.8rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--gold-dim);
            border: 2px solid var(--gold-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--gold);
            flex-shrink: 0;
            margin: 0 auto 0.5rem auto; /* Center for mobile */
        }

        .welcome-text h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .welcome-text p {
            font-size: 0.72rem;
            color: var(--text-mute);
            margin-top: 0.2rem;
        }

        /*  Live Clock  */
        .clock-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.4rem 2rem;
            margin-bottom: 1.2rem;
            text-align: center;
        }

        #live-time {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.6rem;
            color: var(--gold);
            letter-spacing: 6px;
        }

        #live-date {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--text-mute);
            margin-top: 0.3rem;
            text-transform: uppercase;
        }

        #shift-badge {
            display: inline-block;
            margin-top: 0.8rem;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /*  Portal Switcher  */
        .portal-switcher {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 1.2rem;
        }

        .portal-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-mute);
            cursor: pointer;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.25s;
        }

        .portal-btn.active {
            background: var(--gold-dim);
            color: var(--gold);
            border: 1px solid var(--gold-border);
        }

        /*  Portal Sections  */
        .portal-section {
            display: none;
        }

        .portal-section.active {
            display: block;
        }

        /*  Attendance Card  */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.2rem;
        }

        .card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--text-soft);
            margin-bottom: 1.2rem;
        }

        .punch-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .punch-slot {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem;
            text-align: center;
        }

        .ps-label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--text-mute);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .ps-time {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--green);
        }

        .ps-empty {
            font-size: 0.78rem;
            color: var(--text-mute);
        }

        .btn-punch {
            flex: 1;
            padding: 0.9rem;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn-punch.in {
            background: rgba(34, 197, 94, 0.15);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .btn-punch.out {
            background: rgba(239, 68, 68, 0.15);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-punch:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .punch-row {
            display: flex;
            gap: 1rem;
        }

        /*  Notifications  */
        .notif-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.2rem;
        }

        .notif-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--text-soft);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge-count {
            background: var(--red);
            color: #fff;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0 4px;
        }

        .notif-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem;
            margin-bottom: 0.8rem;
            animation: fadeUp 0.3s ease;
        }

        .notif-item.type-housekeep {
            border-left: 3px solid var(--amber);
        }

        .notif-item.type-checkout {
            border-left: 3px solid var(--red);
        }

        .notif-item.type-order {
            border-left: 3px solid var(--blue);
        }

        .notif-item.type-ready {
            border-left: 3px solid var(--green);
        }

        .notif-item.type-service {
            border-left: 3px solid var(--purple);
        }

        .notif-item.done {
            opacity: 0.45;
        }

        .notif-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.4rem;
        }

        .notif-title {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .notif-time {
            font-size: 0.65rem;
            color: var(--text-mute);
        }

        .notif-msg {
            font-size: 0.78rem;
            color: var(--text-mute);
            margin-bottom: 0.8rem;
        }

        .notif-actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .btn-notif {
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }

        .btn-done {
            background: rgba(34, 197, 94, 0.15);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .btn-done:hover {
            background: rgba(34, 197, 94, 0.35);
        }

        .btn-issue {
            background: rgba(239, 68, 68, 0.15);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-issue:hover {
            background: rgba(239, 68, 68, 0.35);
        }

        .btn-dismiss {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-mute);
            border: 1px solid var(--border);
        }

        /*  History  */
        .history-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .history-row:last-child {
            border-bottom: none;
        }

        .history-date {
            color: var(--text-mute);
            font-size: 0.68rem;
        }

        .shift-pill {
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .pill-morning {
            background: rgba(251, 191, 36, 0.15);
            color: #FBBF24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .pill-afternoon {
            background: rgba(245, 158, 11, 0.15);
            color: var(--amber);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .pill-evening {
            background: rgba(139, 92, 246, 0.15);
            color: #A78BFA;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .pill-night {
            background: rgba(59, 130, 246, 0.15);
            color: #93C5FD;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .pill-unknown {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-mute);
            border: 1px solid var(--border);
        }

        /*  Logout  */
        .btn-logout {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-mute);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        .btn-logout:hover {
            color: var(--red);
            border-color: rgba(239, 68, 68, 0.3);
        }

        /*  Empty State  */
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-mute);
            font-size: 0.82rem;
        }

        /*  Status flash  */
        .status-msg {
            font-size: 0.78rem;
            text-align: center;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            margin-top: 0.8rem;
        }

        .status-msg.success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status-msg.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /*  Checkout Gate Banner  */
        .checkout-gate {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            padding: 1rem;
            margin-bottom: 0.8rem;
            font-size: 0.82rem;
            color: var(--red);
        }

        .checkout-gate strong {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        /*  Animations  */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card,
        #dashboard>* {
            animation: fadeUp 0.4s ease;
        }

        /*  Pulse notification dot  */
        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            margin-right: 6px;
            animation: pulseDot 1.5s ease-in-out infinite;
        }

        @keyframes pulseDot {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.6);
                opacity: 0.5;
            }
        }
    </style>
    <link rel="icon" href="br.png" type="image/png">
</head>

<body>

    <!--  Page Loader / Splash  -->
    <div id="page-loader">
        <img src="br.png" alt="Logo" class="loader-logo" style="width:180px; height:auto; max-height:180px; object-fit:contain; filter: drop-shadow(0 0 35px rgba(212,175,55,0.3)); transform: scale(1.1);">
        <div class="loader-spin" style="margin-top:3.5rem;"></div>
    </div>

    <!--  Auth Panel  -->
    <div id="auth-panel" style="display:none; min-height:100vh; padding: 2rem 1.5rem;">
        <div class="brand" style="margin-bottom: 3rem;">
            <img src="br.png" alt="Br"
                style="width:80px; height:80px; margin-bottom:1rem; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));">
            <h1>BARAK RESIDENCY</h1>
            <p>Unified Staff Portal</p>
        </div>

        <div class="auth-card" style="margin-top:0;">
            <div class="tab-row" role="tablist">
                <button class="tab-btn active" id="tab-login" onclick="showTab('login')" role="tab">Login</button>
                <button class="tab-btn" id="tab-register" onclick="showTab('register')" role="tab">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <label for="login-email">Employee Email</label>
                <input type="email" id="login-email" placeholder="you@barakresidency.in" autocomplete="email" required>
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
                    required>
                <button class="btn-primary" type="submit" id="btn-login">Sign In</button>
                <div id="login-msg" class="msg" style="display:none;"></div>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display:none;">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" placeholder="Ramesh Kumar" autocomplete="name" required>
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="you@barakresidency.in" autocomplete="email" required>
                <label for="reg-dept">Department</label>
                <select id="reg-dept" required>
                    <option value="" disabled selected>Select Department</option>
                    <option value="Front Desk">Front Desk</option>
                    <option value="Housekeeping">Housekeeping</option>
                    <option value="Restaurant">Restaurant</option>
                    <option value="Kitchen">Kitchen</option>
                    <option value="Security">Security</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="Management">Management</option>
                </select>
                <label for="reg-team">Team / Portal</label>
                <select id="reg-team" required>
                    <option value="" disabled selected>I work in…</option>
                    <option value="hotel">Hotel (Housekeeping, Front Desk, Security)</option>
                    <option value="restaurant">Restaurant (Waiter, Kitchen, Counter)</option>
                    <option value="both">Both</option>
                </select>
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password"
                    required>
                <button class="btn-primary" type="submit" id="btn-register">Create Account</button>
                <div id="register-msg" class="msg" style="display:none;"></div>
            </form>
        </div>
    </div>

    <script>
        /*  Tab switcher (non-module)  */
        function showTab(tab) {
            const lf = document.getElementById('login-form');
            const rf = document.getElementById('register-form');
            const tl = document.getElementById('tab-login');
            const tr = document.getElementById('tab-register');
            if (tab === 'login') {
                lf.style.display = 'block'; rf.style.display = 'none';
                tl.classList.add('active'); tr.classList.remove('active');
            } else {
                lf.style.display = 'none'; rf.style.display = 'block';
                tl.classList.remove('active'); tr.classList.add('active');
            }
            document.getElementById('login-msg').style.display = 'none';
            document.getElementById('register-msg').style.display = 'none';
        }
    </script>

    <script type="module" src="staff_login.js?v=2.1"></script>
</body>

</html>
