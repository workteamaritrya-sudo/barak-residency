<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reception Hub | Barak Residency</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="firebase-sync.js"></script>
    <script type="module">
        import { firebaseAuth, firebaseHooks } from './firebase-sync.js';
        
        // Force login check on every page load
        firebaseHooks.onAuthStateChanged(firebaseAuth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                // If logged in, show the hub
                document.getElementById('hub-wrapper').style.display = 'block';
            }
        });
    </script>
    <style>
        body { background: #050B1A; overflow-x: hidden; }
        .top-navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2rem; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 999;
        }
        .navbar-brand { display: flex; align-items: center; gap: 1rem; }
        .navbar-brand img { width: 40px; }
        .main-layout { padding: 2rem; max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 2rem; }
        
        /* Mobile adjustment */
        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
            .reception-orders-sidebar { position: fixed; bottom: 0; left:0; width: 100%; height: 60px; z-index: 1000; overflow: hidden; background: #0A1229; }
        }

        .side-panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 1.5rem; height: calc(100vh - 120px); display: flex; flex-direction: column; overflow: hidden; }
        
        .logout-pill {
            background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3); color: #F43F5E;
            padding: 0.5rem 1rem; border-radius: 20px; font-weight: 800; font-size: 0.75rem; cursor: pointer; transition: 0.3s;
        }
        .logout-pill:hover { background: #F43F5E; color: white; }
    </style>
</head>
<body>

    <div id="hub-wrapper" style="display: none;">
        <header class="top-navbar">
            <div class="navbar-brand">
                <img src="br.png" alt="Barak Residency">
                <div>
                    <div class="golden-brand" style="font-size: 1rem; font-weight: 800; letter-spacing: 1px;">BARAK HUB</div>
                    <div style="font-size: 0.6rem; letter-spacing: 3px; color: rgba(255,255,255,0.5);">EXECUTIVE RECEPTION DASHBOARD</div>
                </div>
            </div>
            
            <div style="display: flex; align-items: center; gap: 2rem;">
                <div id="live-clock" style="font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.2rem; color: #D4AF37;">00:00 AM</div>
                <button class="logout-pill" onclick="app.handleLogout()">🚪 SIGN OUT</button>
            </div>
        </header>

        <main class="main-layout">
            <!-- Room Management Area -->
            <div class="rooms-container">
                <section class="floor">
                    <h2 style="color: var(--gold-primary); font-family: 'Inter', sans-serif; font-weight: 800; margin-bottom: 1.5rem; letter-spacing: 2px;">FLOOR 1</h2>
                    <div class="room-grid" id="floor-1"></div>
                </section>
                <section class="floor" style="margin-top: 3rem;">
                    <h2 style="color: var(--gold-primary); font-family: 'Inter', sans-serif; font-weight: 800; margin-bottom: 1.5rem; letter-spacing: 2px;">FLOOR 2</h2>
                    <div class="room-grid" id="floor-2"></div>
                </section>
            </div>

            <!-- Orders & Service Panel -->
            <div class="side-panel glass-panel">
                <div style="flex: 1; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1rem; overflow: hidden; display: flex; flex-direction: column;">
                    <h3 style="color: #D4AF37; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; letter-spacing: 1px;">
                        LIVE ROOM ORDERS <span id="room-order-badge-count" class="badge">0</span>
                    </h3>
                    <div id="room-orders-panel" style="flex: 1; overflow-y: auto;"></div>
                </div>
                <div style="flex: 1; padding-top: 1rem; overflow: hidden; display: flex; flex-direction: column;">
                    <h3 style="color: #F43F5E; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; letter-spacing: 1px;">
                        SERVICE REQUESTS <span id="service-req-count" class="badge">0</span>
                    </h3>
                    <div id="service-requests-panel" style="flex: 1; overflow-y: auto;"></div>
                </div>
            </div>
        </main>

        <!-- Command Center (Floats over content) -->
        <aside class="command-center" id="command-center">
            <div class="glass-panel cc-inner" style="min-width: 420px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); border: 1px solid rgba(212,175,55,0.2);">
                <button class="close-btn" onclick="app.closeCommandCenter()">&times;</button>
                <h2 class="cc-title" id="cc-room-title" style="font-size: 2rem; color: #D4AF37;">Room --</h2>
                
                <div id="cc-content-empty">
                    <p style="opacity: 0.6; margin-bottom: 2rem;">This room is currently available for guest check-in.</p>
                    <div style="display: flex; gap: 1rem;">
                        <button class="btn btn-primary flex-1" onclick="app.showCheckInForm()">CHECK IN GUEST</button>
                        <button class="btn btn-outline flex-1" style="border-color: #a855f7; color: #a855f7;" onclick="app.openReserveModal()">RESERVE</button>
                    </div>
                </div>

                <div id="cc-content-occupied" style="display: none;">
                    <div class="cc-section">
                        <h3 style="font-size: 0.7rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px;">Guest Profile</h3>
                        <div class="metadata-grid" style="margin-top: 0.8rem;">
                            <div class="meta-item"><span class="meta-label">Name</span><span class="meta-value" id="cc-guest-name" style="color: white; font-weight: 800;">--</span></div>
                            <div class="meta-item"><span class="meta-label">Phone</span><span class="meta-value" id="cc-guest-phone" style="opacity: 0.7;">--</span></div>
                        </div>
                    </div>
                    <div class="cc-section" style="margin-top: 1.5rem;">
                        <h3 style="font-size: 0.7rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px;">Financial Ledger</h3>
                        <div class="ledger-pill luxury-glow" style="background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.2); padding: 1rem; border-radius: 12px; display: flex; justify-content: space-between; margin-top: 0.8rem;">
                            <span style="font-weight: 600;">Net Payable</span>
                            <span id="cc-total-bill" style="font-weight: 800; color: #D4AF37; font-size: 1.2rem;">₹ 0</span>
                        </div>
                    </div>
                    <div class="cc-actions mt-4" style="display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 1.5rem;">
                        <button class="btn btn-outline" style="flex:1" onclick="app.toggleOrderHistory()">HISTORY</button>
                        <button class="btn btn-primary" style="flex:1" onclick="app.generateInvoice()">PRINT BILL</button>
                        <button id="cc-finalize-btn" class="btn btn-success" style="flex:1; background: #22C55E;" onclick="app.finalizePayAndCheckout()">CHECKOUT</button>
                    </div>
                </div>
                
                <div id="cc-content-reserved" style="display: none;">
                    <div class="cc-section">
                        <h3 style="color: #a855f7; font-size: 0.7rem; text-transform: uppercase;">Reservation Data</h3>
                        <div class="metadata-grid" id="cc-res-grid" style="margin-top: 0.8rem;"></div>
                        <button class="btn btn-primary btn-block mt-6" onclick="app.convertResToCheckin()">CONVERT TO CHECK-IN</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Check-in Modal Overlay -->
    <div id="checkin-modal" class="modal-overlay" style="display:none; z-index:20000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);">
        <div class="glass-panel" style="max-width:500px; width: 90%; padding:2.5rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;">
            <h2 style="font-family: 'Inter', sans-serif; font-weight: 800; color: #D4AF37; margin-bottom: 2rem;">GUEST CHECK-IN</h2>
            <div id="checkin-form-container"></div>
            <div style="display:flex; gap:1rem; margin-top:2rem;">
                <button class="btn btn-primary flex-1" onclick="app.processCheckIn()">CONFIRM & SAVE</button>
                <button class="btn btn-outline flex-1" onclick="app.closeCheckInForm()">CANCEL</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { PMSApp } from './app.js';
        window.app = new PMSApp();
    </script>
</body>
</html>
