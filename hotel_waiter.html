<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hotel Waiter | Barak Residency</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="restaurant_portal.css">
    <style>
        /* Modern Hotel UI Overrides */
        .waiter-menu-card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px; padding: 1.25rem; 
            text-align: center; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .waiter-menu-card:hover { transform: translateY(-4px); border-color: var(--gold-primary); background: rgba(212,175,55,0.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .item-name { font-weight: 700; font-size: 1rem; margin: 0.5rem 0 0.25rem; color: #fff; }
        .item-price { color: var(--gold-primary); font-weight: 800; font-size: 1.1rem; }
        
        .cat-pill { white-space: nowrap; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.5rem 1.25rem; border-radius: 25px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; font-weight: 600; color: #94A3B8; }
        .cat-pill.active { background: var(--gold-primary); color: #000; border-color: var(--gold-primary); box-shadow: 0 4px 12px rgba(212,175,55,0.3); }

        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 0.75rem; border: 1px solid rgba(255,255,255,0.05); }
        .qty-ctrl { display: flex; align-items: center; gap: 0.75rem; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 8px; }
        .qty-ctrl button { background: transparent; border: none; color: #fff; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .history-card { background: rgba(34,197,94,0.05); border: 1px solid rgba(34,197,94,0.1); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; }
        .history-card { background: rgba(34,197,94,0.05); border: 1px solid rgba(34,197,94,0.1); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; }

        /* Floating Cart (Mobile Friendly) */
        .cart-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(5, 11, 26, 0.98); backdrop-filter: blur(20px); flex-direction: column; padding: 2rem; }
        .cart-overlay.active { display: flex; animation: slideUp 0.4s cubic-bezier(.22,1,.36,1); }
        .floating-cart-btn { position: fixed; bottom: 2rem; right: 2rem; z-index: 900; background: var(--gold-primary); color: #000; border-radius: 50%; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 40px rgba(212,175,55,0.4); border: none; cursor: pointer; transition: 0.2s; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #FF4444; color: white; border-radius: 50%; min-width: 22px; height: 22px; font-size: 0.75rem; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #050B1A; }

        /* Success Screen */
        .success-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: #050B1A; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .success-medal { width: 120px; height: 120px; background: var(--gold-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 4rem; margin-bottom: 2rem; box-shadow: 0 0 50px rgba(212,175,55,0.3); animation: medalPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        @keyframes medalPop { 0% { transform: scale(0); opacity:0; } 100% { transform: scale(1); opacity:1; } }
        @keyframes slideUp { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
        
        @media (max-width: 900px) {
            .pos-cart { display: none !important; }
            .waiter-sidebar { display: flex !important; width: 100% !important; flex: none !important; flex-direction: column !important; padding: 1rem !important; margin-bottom: 0.5rem; }
            #room-summary, #waiter-live-orders, .waiter-sidebar h3 { display: none !important; } /* Simplify on mobile */
            .luxury-portal-header { justify-content: space-between !important; padding: 1rem !important; }
            .luxury-portal-header .luxury-identity { font-size: 0.9rem !important; }
            .waiter-layout { padding: 0.5rem !important; flex-direction: column !important; }
        }
    </style>
    <link rel="icon" href="br.png" type="image/png">
</head>
<body>
    <div class="page">
        <header class="luxury-portal-header" style="justify-content: space-between; padding: 1.25rem;">
            <div class="luxury-identity">ROOM ORDER POS</div>
            <button class="btn btn-outline" style="padding:0.5rem 1rem; font-size:0.75rem; border-color:rgba(255,255,255,0.2);" onclick="window.backToHome()">BACK TO PORTAL ×</button>
        </header>

        <main class="waiter-layout">
            <!-- Room Selection Sidebar -->
            <aside class="waiter-sidebar glass-panel">
                <h3 style="color:var(--gold-primary); letter-spacing:1px; font-size:0.9rem; text-transform:uppercase; margin-bottom:1rem;">Select Room</h3>
                <div class="form-group">
                    <select id="waiter-room-select" class="form-control" onchange="window.selectRoom(this.value)" style="background:var(--color-slate-900); border:1px solid gold; color:white; font-size:1rem; padding:0.8rem;">
                        <option value="">Loading rooms...</option>
                    </select>
                </div>
                <div id="waiter-addon-badge" style="display:none; background:linear-gradient(135deg, #7C3AED, #5B21B6); color:white; padding:0.6rem; border-radius:12px; font-size:0.75rem; text-align:center; font-weight:800; margin-top:0.75rem; box-shadow:0 4px 12px rgba(124,58,237,0.3);">ADD-ON MODE</div>
                
                <!-- Room Info Summary -->
                <div id="room-summary" style="margin-top:1.5rem; padding:1rem; border-radius:16px; background:rgba(212,175,55,0.05); border:1px solid rgba(212,175,55,0.1); display:none;">
                    <span style="font-size:0.65rem; color:var(--gold-primary); text-transform:uppercase; letter-spacing:1px;">Active Guest</span>
                    <div id="summary-guest-name" style="font-weight:800; font-size:1.1rem; margin:0.2rem 0;">---</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.5rem; border-top:1px solid rgba(255,255,255,0.05); padding-top:0.5rem;">
                        <span style="font-size:0.8rem; opacity:0.6;">Current Total</span>
                        <span id="summary-total" style="font-weight:900; color:var(--gold-primary); font-size:1.1rem;">₹0</span>
                    </div>
                </div>

                <div style="margin-top:2rem; flex:1; display:flex; flex-direction:column;">
                    <h3 style="color:var(--gold-primary); font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:0.75rem;">Ongoing Activity</h3>
                    <div id="waiter-live-orders" style="flex:1; overflow-y:auto;" class="text-sm"></div>
                </div>
            </aside>

            <!-- Menu POS Area -->
            <section class="waiter-pos glass-panel">
                <div class="pos-header" style="padding:1.5rem 0.5rem;">
                    <h2 id="ordering-room-display" style="font-family:'Outfit',sans-serif; letter-spacing:1px; color:var(--gold-primary); font-size:1.3rem;">SELECT A ROOM TO BEGIN</h2>
                </div>
                
                <div class="pos-body">
                    <!-- Menu Grid -->
                    <div style="flex:2; display:flex; flex-direction:column; min-width:0;">
                        <nav id="order-categories" style="display:flex; gap:0.6rem; overflow-x:auto; padding-bottom:1.25rem; scrollbar-width:none;"></nav>
                        <div id="order-menu-grid" class="pos-menu" style="grid-template-columns: 1fr 1fr !important; display:grid;"></div>
                    </div>

                    <!-- Cart (Desktop Only) -->
                    <div id="desktop-cart" class="pos-cart" style="flex:1; min-width:320px;">
                        <h3 style="color:var(--gold-primary); font-size:0.9rem; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:1rem; margin-bottom:1.5rem;">Live Cart</h3>
                        <div id="waiter-cart-items" class="cart-items" style="flex:1; overflow-y:auto;"></div>
                        
                        <div id="cart-footer-common" class="cart-total" style="margin-top:auto; padding-top:2rem; border-top:1px solid rgba(255,255,255,0.1);">
                            <div class="d-flex justify-between" style="font-size:1.6rem; font-weight:800; margin-bottom:1.5rem;">
                                <span style="opacity:0.6; font-size:1rem; padding-top:0.4rem;">Order Total</span>
                                <span style="color:#4ADE80;">₹<span id="waiter-total-amt">0</span></span>
                            </div>
                            <button id="waiter-place-btn" class="btn btn-primary btn-block" style="padding:1.2rem; font-size:1.2rem; background:var(--gold-primary); color:#000; font-weight:900;" disabled onclick="window.placeOrder()">PLACE ROOM ORDER</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Mobile Cart Layer -->
    <div id="cart-overlay-mob" class="cart-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <h2 style="color:var(--gold-primary); font-family:'Outfit'; font-weight:800; letter-spacing:2px;">REVIEW ORDER</h2>
            <button onclick="window.toggleCart()" style="background:transparent; border:none; color:white; font-size:2rem;">&times;</button>
        </div>
        <div id="cart-placeholder-mob" style="flex:1; display:flex; flex-direction:column; overflow:hidden;"></div>
    </div>

    <button id="floating-cart" class="floating-cart-btn" onclick="window.toggleCart()">
        <svg style="width:28px; height:28px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"></path></svg>
        <span id="cart-badge-val" class="cart-badge" style="display:none;">0</span>
    </button>

    <!-- Success Screen Overlay -->
    <div id="success-screen" class="success-overlay">
        <div class="success-medal">✓</div>
        <h1 style="color:var(--gold-primary); font-family:'Outfit'; font-weight:900; letter-spacing:3px; margin-bottom:1rem;">ORDER PLACED</h1>
        <p style="color:white; opacity:0.6; letter-spacing:1px;">Redirecting back to portal...</p>
    </div>

    <!-- Portion/Qty Modal -->
    <div id="waiter-portion-modal" class="modal-overlay" style="display:none; align-items:center; justify-content:center;">
        <div class="security-box" style="width:400px; max-width:92vw; padding:2.5rem 2rem; border-radius:28px;">
            <h3 id="wpm-item-name" style="text-align:center; color:var(--gold-primary); font-size:1.5rem; margin-bottom:0.5rem;"></h3>
            <p id="wpm-item-desc" style="text-align:center; font-size:0.85rem; opacity:0.6; color:#94A3B8; margin-bottom:2rem;"></p>
            
            <div id="wpm-options-container" class="mb-4" style="display:flex; flex-direction:column; gap:0.75rem;"></div>
            
            <div id="wpm-qty-ctrl" style="display:none; justify-content:center; align-items:center; gap:2.5rem; margin:2rem 0;">
                <button onclick="window.adjustWpmQty(-1)" style="width:50px; height:50px; border-radius:18px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white; font-size:1.5rem; cursor:pointer;">&minus;</button>
                <span id="wpm-qty-val" style="font-size:2.8rem; font-weight:900;">1</span>
                <button onclick="window.adjustWpmQty(1)" style="width:50px; height:50px; border-radius:18px; border:1px solid rgba(212,175,55,0.3); background:rgba(212,175,55,0.1); color:var(--gold-primary); font-size:1.5rem; cursor:pointer;">&plus;</button>
            </div>

            <button id="wpm-submit-btn" class="btn btn-primary btn-block" style="padding:1.1rem; font-size:1.1rem; margin-top:1.5rem; display:none;">Add to Cart</button>
            <button onclick="document.getElementById('waiter-portion-modal').style.display='none'" style="width:100%; background:transparent; border:none; color:#94A3B8; font-size:0.9rem; margin-top:1.5rem; cursor:pointer; text-decoration:underline;">Discard</button>
        </div>
    </div>

    <!-- Toast UI -->
    <div id="toast-container" style="position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); z-index:10000; pointer-events:none;"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="firebase-sync.js"></script>
    <script type="module" src="hotel_waiter_app.js?v=2.6"></script>
    <script>
        (function() {
            const p = new URLSearchParams(window.location.search);
            if (p.get('embedded') === '1') {
                const l = document.getElementById('btn-hw-logout');
                const c = document.getElementById('btn-hw-close');
                if (l) l.style.display = 'none';
                if (c) c.style.display = 'inline-block';
            }
        })();
    </script>
</body>
</html>
