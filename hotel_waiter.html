<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Waiter | Barak Residency</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="restaurant_portal.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gold-primary: #D4AF37;
        }
        body { margin: 0; background: #050B1A; color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .page-layout { display: grid; grid-template-columns: 1fr 350px; height: 100vh; overflow: hidden; }
        .main-area { display: flex; flex-direction: column; border-right: 1px solid var(--glass-border); overflow: hidden; }
        .sidebar { background: rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 1rem 2rem; background: rgba(212,175,55,0.05); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .identity { font-weight: 800; letter-spacing: 1px; color: var(--gold-primary); }
        
        .controls { padding: 1rem 2rem; border-bottom: 1px solid var(--glass-border); display: flex; gap: 1rem; align-items: center; flex-shrink: 0; }
        .room-select { background: #111827; border: 1px solid var(--glass-border); color: white; padding: 0.6rem; border-radius: 8px; flex: 1; }
        
        #order-categories { padding: 0.5rem 2rem; display: flex; gap: 0.5rem; overflow-x: auto; flex-shrink: 0; }
        .waiter-cat-pill { white-space: nowrap; background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; padding: 0.4rem 1rem; border-radius: 20px; cursor: pointer; }
        .waiter-cat-pill.active { background: var(--gold-primary); border-color: var(--gold-primary); color: #050B1A; font-weight: 700; }
        
        #order-menu-grid { flex: 1; overflow-y: auto; padding: 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; }
        .waiter-menu-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1rem; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
        .waiter-menu-card:hover { transform: translateY(-3px); border-color: var(--gold-primary); background: rgba(212,175,55,0.08); }
        .item-name { font-weight: 700; margin: 0.5rem 0 0.2rem; }
        .item-price { color: var(--gold-primary); font-weight: 800; }
        .item-half-price { font-size: 0.75rem; opacity: 0.6; }
        
        .cart-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        #waiter-cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem; background: var(--glass-bg); border-radius: 10px; margin-bottom: 0.8rem; }
        .cart-info { flex: 1; }
        .cart-name { font-weight: bold; font-size: 0.9rem; }
        .cart-sub { font-size: 0.75rem; color: #9CA3AF; }
        .cart-controls { display: flex; align-items: center; gap: 0.8rem; }
        .cart-controls button { background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; }
        
        .cart-footer { padding: 1.5rem; background: rgba(0,0,0,0.4); border-top: 1px solid var(--glass-border); flex-shrink: 0; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: 800; margin-bottom: 1.5rem; }
        .btn-place { width: 100%; padding: 1.2rem; background: linear-gradient(135deg, #FFD700, #D4AF37); border: none; border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; color: #000; box-shadow: 0 4px 15px rgba(212,175,55,0.3); }
        .btn-place:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        
        .history-section { height: 320px; border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; background: rgba(0,0,0,0.2); flex-shrink: 0; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 999; }
        .modal-box { background: #0F172A; border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; width: 400px; max-width: 90vw; }
        .wpm-opt-btn { width: 100%; padding: 1rem; margin-bottom: 0.8rem; background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; }
        .wpm-counter { display: flex; align-items: center; justify-content: center; gap: 2rem; margin: 1.5rem 0; }
        .wpm-counter button { width: 50px; height: 50px; border-radius: 50%; background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; font-size: 1.5rem; cursor: pointer; }
        #wpm-qty-val { font-size: 2.5rem; font-weight: 900; }
        .wpm-add-btn { width: 100%; padding: 1rem; background: #22C55E; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        
        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 2rem; border-radius: 8px; font-weight: bold; z-index: 1000; }
        .toast.success { background: #22C55E; color: white; }
        .toast.warning { background: #EAB308; color: #000; }
        .empty-msg { text-align: center; color: #6B7280; padding: 2rem; font-style: italic; }
    </style>
</head>
<body>
    <div class="page-layout">
        <div class="main-area">
            <div class="header">
                <div class="identity">BARAK RESIDENCY — HOTEL WAITER</div>
                <button onclick="window.handleLogout()" style="background:transparent; border:1px solid #EF4444; color:#FCA5A5; padding:0.4rem 0.8rem; border-radius:6px; cursor:pointer;">Logout</button>
            </div>
            <div class="controls">
                <select id="waiter-room-select" class="room-select" onchange="window.selectRoom(this.value)">
                    <option value="">Loading rooms...</option>
                </select>
                <div id="waiter-addon-badge" style="display:none; background:#A020F0; color:white; padding:0.4rem 0.8rem; border-radius:20px; font-size:0.75rem; font-weight:800; animation:pulse 2s infinite;">ADD-ON MODE</div>
            </div>
            <div id="ordering-room-display" style="padding: 0.5rem 2rem; font-size:0.8rem; color:var(--gold-primary); font-weight:700;">SELECT A ROOM TO BEGIN</div>
            
            <div id="order-categories"></div>
            <div id="order-menu-grid"></div>
        </div>
        
        <div class="sidebar">
            <div class="cart-section">
                <div style="padding:1.5rem; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:800; letter-spacing:1px; color:var(--gold-primary);">LIVE CART</span>
                    <button onclick="window.location.reload()" style="background:transparent; border:none; color:var(--text-gray); cursor:pointer; font-size:0.7rem;">🔄 Refresh</button>
                </div>
                
                <!-- Room Summary (New) -->
                <div id="room-summary" style="padding:1rem 1.5rem; background:rgba(212,175,55,0.03); border-bottom:1px solid var(--glass-border); display:none;">
                    <div style="font-size:0.75rem; opacity:0.6; text-transform:uppercase; letter-spacing:1px;">Active Guest</div>
                    <div id="summary-guest-name" style="font-weight:800; color:white; font-size:1.1rem; margin:0.2rem 0;">---</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.5rem;">
                        <span style="font-size:0.8rem; opacity:0.7;">Current Total</span>
                        <span id="summary-total" style="font-weight:900; color:var(--gold-primary);">₹0</span>
                    </div>
                </div>

                <div id="waiter-cart-items"></div>
                <div class="cart-footer">
                    <div class="total-row">
                        <span>Cart Total:</span>
                        <span style="color:#4ADE80;">₹<span id="waiter-total-amt">0</span></span>
                    </div>
                    <button id="waiter-place-btn" class="btn-place" onclick="window.placeOrder()" disabled>🚀 PLACE ORDER</button>
                </div>
            </div>
            
            <div style="height:350px; border-top:1px solid var(--glass-border); display:flex; flex-direction:column; background:rgba(0,0,0,0.2);">
                <div style="padding:1rem; border-bottom:1px solid var(--glass-border); font-weight:700; font-size:0.8rem; color:var(--gold-primary); text-transform:uppercase; letter-spacing:1px;">Room History & Add-ons</div>
                <div id="waiter-live-orders" style="flex:1; overflow-y:auto; padding:1rem;"></div>
            </div>
        </div>
    </div>

    <!-- Modal: Portion & Qty -->
    <div id="waiter-portion-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="wpm-item-name" style="margin:0 0 0.5rem; color:var(--gold-primary);"></h3>
            <p id="wpm-item-desc" style="font-size:0.85rem; opacity:0.7; margin-bottom:1.5rem;"></p>
            <div id="wpm-options-container"></div>
            <button onclick="document.getElementById('waiter-portion-modal').style.display='none'" style="width:100%; background:transparent; border:none; color:#9CA3AF; margin-top:1rem; cursor:pointer;">Close</button>
        </div>
    </div>

    <script type="module" src="firebase-config.js?v=2.0"></script>
    <script type="module" src="firebase-sync.js?v=2.0"></script>
    <script type="module" src="hotel_waiter_app.js?v=2.0"></script>
</body>
</html>
